<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Página Inicial</title>
    <link rel="stylesheet" href="{{ url_for('css', filename='style.css') }}">
</head>

<body class="{{ tema }}">

    <h1>Bem-vindo!</h1>

    {% if nome %}
        <h2>Olá, {{ nome }}!</h2>
        <p>Email: {{ email }}</p>
    {% else %}
        <p>Nenhum usuário cadastrado.</p>
    {% endif %}

    <a href="/cadastro">Cadastrar</a>

    <h3>Alterar Tema</h3>

    <a href="/tema/claro">Tema Claro</a>
    <a href="/tema/escuro">Tema Escuro</a>

</body>
</html>
